<!-- Elevated Catalog Section -->
<section id="catalog" class="catalog-section fade-in-section">
    <div class="container relative">
        
        <div class="catalog-header section-header">
            <h2>The Collection</h2>
            <div class="decorative-line"></div>
            <p>Find the aesthetic that perfectly narrates your love story.</p>
        </div>
        
        <!-- Premium Search Pill -->
        <div class="search-filter-glass">
            <div class="search-bar-modern">
                <i class="feather fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search our collection (e.g. Enchanted, ET-101)...">
            </div>
            <div class="template-counter-modern">
                <span id="templateCount" class="count-number">0</span><span class="count-label">Designs</span>
            </div>
        </div>

        <!-- Templates Grid -->
        <div id="templatesGrid" class="templates-grid-modern">
            <!-- Cards dynamically injected via JS -->
        </div>
        
        <!-- Empty State -->
        <div id="noResults" class="no-results hidden">
            <div class="empty-icon-ring">
                <i class="fas fa-search-minus"></i>
            </div>
            <h3>No designs match your vision</h3>
            <p>Try refining your search terms to explore more of our collection.</p>
        </div>

    </div>
</section>
